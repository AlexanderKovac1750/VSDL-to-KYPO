http_server:
  - version: 2.4.34
    OS: 
      - ubuntu-22.04
    ansible:
      - name: Install required packages
        apt:
          name: 
            - build-essential
            - libpcre3
            - libpcre3-dev
            - libssl-dev
            - libexpat1-dev
            - wget
            - libnghttp2-dev
          update_cache: true
          state: present

      - name: Ensure build directory exists
        file:
          path: "/usr/local/src"
          state: directory

      - name: Download Apache source
        get_url:
          url: "https://archive.apache.org/dist/httpd/httpd-2.4.34.tar.gz"
          dest: "/usr/local/src/httpd-2.4.34.tar.gz"

      - name: Extract Apache source
        unarchive:
          src: "/usr/local/src/httpd-2.4.34.tar.gz"
          dest: "/usr/local/src"
          remote_src: yes

      - name: Download APR
        get_url:
          url: "https://archive.apache.org/dist/apr/apr-1.6.3.tar.gz"
          dest: "/usr/local/src/apr-1.6.3.tar.gz"

      - name: Extract APR
        unarchive:
          src: "/usr/local/src/apr-1.6.3.tar.gz"
          dest: "/usr/local/src/httpd-2.4.34/srclib/"
          remote_src: yes

      - name: Rename APR directory
        command: mv apr-1.6.3 apr
        args:
          chdir: "/usr/local/src/httpd-2.4.34/srclib"
          creates: "/usr/local/src/httpd-2.4.34srclib/apr"

      - name: Download APR-util
        get_url:
          url: "https://archive.apache.org/dist/apr/apr-util-1.6.1.tar.gz"
          dest: "/usr/local/src/apr-util-1.6.1.tar.gz"

      - name: Extract APR-util
        unarchive:
          src: "/usr/local/src/apr-util-1.6.1.tar.gz"
          dest: "/usr/local/src/httpd-2.4.34/srclib/"
          remote_src: yes

      - name: Rename APR-util directory
        command: mv apr-util-1.6.1 apr-util
        args:
          chdir: "/usr/local/src/httpd-2.4.34/srclib"
          creates: "/usr/local/src/httpd-2.4.34/srclib/apr-util"

      - name: Download Openssl 1.1 source
        get_url:
          url: "https://www.openssl.org/source/openssl-1.1.1w.tar.gz"
          dest: "/usr/local/src/openssl-1.1.1w.tar.gz"

      - name: Extract Openssl source
        unarchive:
          src: "/usr/local/src/openssl-1.1.1w.tar.gz"
          dest: "/usr/local/src"
          remote_src: yes

      - name: Configure OpenSSL
        command: >
          ./config
          --prefix=/opt/openssl-1.1
          --openssldir=/usr/local/src/openssl-1.1.1w
          shared
        args:
          chdir: "/usr/local/src/openssl-1.1.1w"
          creates: "/usr/local/src/openssl-1.1.1w/Makefile"

      - name: Build OpenSSL
        command: make -j{{ ansible_processor_vcpus | default(2) }}
        args:
          chdir: "/usr/local/src/openssl-1.1.1w"

      - name: Install OpenSSL
        command: make install
        args:
          chdir: "/usr/local/src/openssl-1.1.1w"

      - name: Add openssl to library path
        copy: 
          dest: /etc/ld.so.conf.d/openssl-1.1.conf
          content: "/opt/openssl-1.1/lib"
          mode: "0644"

      - name: Refresh dynamic linker cache
        command: ldconfig

      - name: Configure Apache
        command: >
          ./configure
          --prefix=/opt/apache-2.4.34
          --enable-so
          --enable-ssl
          --with-ssl=/opt/openssl-1.1
          --with-included-apr
          --enable-http2
          --with-nghttp2
        args:
          chdir: "/usr/local/src/httpd-2.4.34"
          creates: "/usr/local/src/httpd-2.4.34/Makefile"

      - name: Compile Apache
        command: make -j{{ ansible_processor_vcpus | default(1) }}
        args:
          chdir: "/usr/local/src/httpd-2.4.34"
          creates: "/usr/local/src/httpd-2.4.34/httpd"

      - name: Install Apache
        command: make install
        args:
          chdir: "/usr/local/src/httpd-2.4.34"
          creates: "/opt/apache-2.4.34/bin/httpd"

      - name: Stop system apache2 if present
        service:
          name: apache2
          state: stopped
          enabled: no
        ignore_errors: yes

      - name: Set Apache Listen port
        lineinfile:
          path: /opt/apache-2.4.34/conf/httpd.conf
          regexp: '^Listen 80'
          line: >
            Listen 8080
              Listen 8443
              <VirtualHost *:8443>
              ServerName 192.168.1.15

              SSLEngine on
              SSLCertificateFile "/opt/apache-2.4.34/conf/server.crt"
              SSLCertificateKeyFile "/opt/apache-2.4.34/conf/server.key"

              Protocols h2 http/1.1
              DocumentRoot "/opt/apache-2.4.34/htdocs"
              </VirtualHost>

      - name: Enable ssl
        lineinfile:
          path: /opt/apache-2.4.34/conf/httpd.conf
          regexp: '^#LoadModule ssl_module modules/mod_ssl.so'
          line: 'LoadModule ssl_module modules/mod_ssl.so'

      - name: Generate certificates
        command: sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /opt/apache-2.4.34/conf/server.key -out /opt/apache-2.4.34/conf/server.crt -subj "/C=SK/CN=digital.sk"

      - name: Enable http2
        lineinfile:
          path: /opt/apache-2.4.34/conf/httpd.conf
          regexp: '^#LoadModule http2_module modules/mod_http2.so'
          line: 'LoadModule http2_module modules/mod_http2.so'

      - name: Make error log
        command: touch /opt/apache-2.4.34/logs/error_log

      - name: Start custom Apache
        command: "/opt/apache-2.4.34/bin/apachectl start"

  - version: latest
    base_boxes:
      - munikypo/kali-2020.4
    ansible:
      - name: Install apache2 web server
        apt:
          name:
            - apache2
          update_cache: true
          state: present

      - name: Set Apache Listen port
        lineinfile:
          path: /etc/apache2/ports.conf
          regexp: '^Listen 80'
          line: 'Listen 8080'

      - name: Change VirtualHost port
        replace:
          path: /etc/apache2/sites-available/000-default.conf
          regexp: '<VirtualHost \*:80>'
          replace: '<VirtualHost *:8080>'

      - name: Create /var/log/apache2 directory
        file:
          path: /var/log/apache2
          state: directory
          mode: '0755'

      - name: Restart Apache
        service:
          name: apache2
          state: restarted
